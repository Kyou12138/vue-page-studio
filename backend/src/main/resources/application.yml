server:
  port: 8080
studio:
  llm:
    base-url: ${STUDIO_LLM_BASE_URL:https://api.openai.com/v1}
    api-key: ${STUDIO_LLM_API_KEY:}
    model: ${STUDIO_LLM_MODEL:gpt-4o-mini}
    temperature: 0.2
    max-tokens: 8192
    timeout-seconds: 120
  # 开发前端端口可能变化（5173 在部分 Windows 上被系统保留）
  cors-allowed-origins: http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173,http://localhost:4173,http://127.0.0.1:4173
  rate-limit:
    ai-per-ip-per-minute: 10
  max-body-bytes: 262144
